# SunKV 默认配置文件（示例）
#
# 1) 解析说明
# - 本文件为“key = value”格式；不要使用未注释的 `[section]`。
# - 空行与以 `#`/`;` 开头的行会被忽略。
#
# 2) 优先级（冲突如何处理）
# - 若存在 `./sunkv.conf`：先加载该文件
# - 再加载命令行参数（命令行会覆盖文件里的同名字段）
#
# 3) 常用命令行覆盖
# - `--port <n>` 覆盖 `port`
# - `--host <addr>` 覆盖 `host`
# - `--thread-pool-size <n>` 覆盖 `thread_pool_size`
# - `--max-connections <n>` 覆盖 `max_connections`（0=不限制）
# - `--data-dir <dir>` 覆盖 `data_dir`
# - `--log-level <LEVEL>` 覆盖 `log_level`
# - `--log-file <path>` 覆盖 `log_file`

# [network]
# 监听地址。`0.0.0.0` 表示监听所有网卡；本机压测常用 `127.0.0.1`。
host = 0.0.0.0
# 监听端口（1~65535）。
port = 6379
# 最大并发连接数。达到后拒绝新连接；0 表示不限制。
max_connections = 1000
# 工作线程数（EventLoop 线程池大小）。通常设为 CPU 核数或其附近。
thread_pool_size = 4

# [storage]
# 数据根目录（部分子路径可被下方 wal_dir/snapshot_dir 覆盖）。
data_dir = ./data
# WAL（预写日志）目录。建议放在 SSD，避免网络盘带来抖动。
wal_dir = ./data/wal
# 快照目录。用于加速恢复与减少 WAL 重放成本。
snapshot_dir = ./data/snapshot
# 内存上限（MB），按键值与容器内容的估算字节数统计；0 表示不限制。超过后 SET 等写命令返回 OOM。
max_memory_mb = 1024

# [persistence]
# 是否启用 WAL（写入路径更可靠，但会增加写放大与延迟）。
enable_wal = true
# 是否启用周期性后台快照（与优雅关闭时的快照独立）。
enable_snapshot = true
# 快照间隔（秒）。enable_snapshot=true 且大于 0 时生效。
snapshot_interval_seconds = 3600
# WAL 刷盘间隔（毫秒）。仅当 wal_flush_policy=periodic 时用于 fsync 节奏。
wal_sync_interval_ms = 100
# 单个 WAL 活跃文件上限（MB）；超过后滚动为 `<wal_path>.<序号>`。0 表示不滚动。
max_wal_file_size_mb = 100
# 是否异步提交 WAL（异步时使用内部队列 + worker 线程）。
wal_async = true
# 异步 WAL 队列最大 batch 数；队列满时 submit 会阻塞（背压）。
wal_max_queue = 100000
# WAL fsync 策略：never（只靠 OS）| always（每次批次）| periodic（按 wal_sync_interval_ms）。
wal_flush_policy = periodic
# group commit：拿到第一批后再等待合并的毫秒数。
wal_group_commit_linger_ms = 2
# group commit：单次 write 前最多合并的 mutation 条数。
wal_group_commit_max_mutations = 8192
# group commit：单次 write 前编码缓冲最大字节数。
wal_group_commit_max_bytes = 2097152

# [logging]
# 日志级别：DEBUG / INFO / WARN / ERROR
# - 线上/压测建议 INFO 或 WARN，避免 DEBUG 造成 I/O 噪声影响性能。
# - Debug 构建下：若未显式传 `--log-level`，程序可能默认提升为 DEBUG 以便排障。
# - 若要做性能对比/压测：建议使用 Release 构建并固定 `log_level=INFO`（或命令行 `--log-level INFO`）。
log_level = INFO
# 日志文件路径模板。
# - 当前为固定文件名：程序会写入该文件，并由内部 rotating 机制自动滚动（例如 sunkv.log.1）
# - 若为空字符串，可能退回到仅控制台输出（视实现而定）
log_file = ./data/logs/sunkv.log
# 日志文件策略：fixed / per_run / daily
# - fixed：固定文件名（如 sunkv.log），由 rotating 自动滚动
# - per_run：每次启动生成独立文件（如 sunkv_YYYYMMDD_HHMMSS.log），文件内仍可滚动
# - daily：按日期归档（如 sunkv_YYYYMMDD.log），文件内仍可滚动
log_strategy = fixed
# 是否同时输出到控制台。
enable_console_log = true
# 是否定期打印运行统计。
enable_periodic_stats_log = false
# 定期统计日志间隔（秒）。启用 enable_periodic_stats_log 后生效。
stats_log_interval_seconds = 30
# 是否打印慢命令结构化日志。
enable_slowlog = false
# 慢命令阈值（毫秒）。小于 0 会被视为非法配置。
slowlog_threshold_ms = 20

# [ttl]
# TTL 清理线程扫描间隔（秒）。过小会增加后台开销，过大可能导致过期键滞留更久。
ttl_cleanup_interval_seconds = 5
# 允许设置的最大 TTL（秒）。2592000 = 30 天。
max_ttl_seconds = 2592000

# [performance]
# TCP keepalive：开启 SO_KEEPALIVE 后，在 Linux 上设置 TCP_KEEPIDLE（秒）。
tcp_keepalive_seconds = 300
# TCP 发送/接收缓冲建议大小（字节），通过 setsockopt 设置。
tcp_send_buffer_size = 65536
tcp_recv_buffer_size = 65536
# 单连接 RESP 输入累积上限（MB），超过则断开并返回 overflow 错误。
max_conn_input_buffer_mb = 8
# 线程本地缓冲池：每种尺寸最多缓存的块数。
memory_pool_max_cached_blocks_per_size = 8
