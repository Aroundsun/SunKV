# SunKV 默认配置文件（示例）
#
# 1) 解析说明
# - 本文件为“key = value”格式；不要使用未注释的 `[section]`。
# - 空行与以 `#`/`;` 开头的行会被忽略。
#
# 2) 优先级（冲突如何处理）
# - 若存在 `./sunkv.conf`：先加载该文件
# - 再加载命令行参数（命令行会覆盖文件里的同名字段）
#
# 3) 常用命令行覆盖
# - `--port <n>` 覆盖 `port`
# - `--host <addr>` 覆盖 `host`
# - `--thread-pool-size <n>` 覆盖 `thread_pool_size`
# - `--max-connections <n>` 覆盖 `max_connections`
# - `--data-dir <dir>` 覆盖 `data_dir`
# - `--log-level <LEVEL>` 覆盖 `log_level`
# - `--log-file <path>` 覆盖 `log_file`

# [network]
# 监听地址。`0.0.0.0` 表示监听所有网卡；本机压测常用 `127.0.0.1`。
host = 0.0.0.0
# 监听端口（1~65535）。
port = 6379
# 最大连接数上限（用于拒绝过多连接的保护阈值；不是系统级 hard limit）。
max_connections = 1000
# 工作线程数（EventLoop 线程池大小）。通常设为 CPU 核数或其附近。
thread_pool_size = 4

# [storage]
# 数据根目录（部分子路径可被下方 wal_dir/snapshot_dir 覆盖）。
data_dir = ./data
# WAL（预写日志）目录。建议放在 SSD，避免网络盘带来抖动。
wal_dir = ./data/wal
# 快照目录。用于加速恢复与减少 WAL 重放成本。
snapshot_dir = ./data/snapshot
# 内存上限（MB）。达到上限时的淘汰/拒绝策略取决于实现版本。
max_memory_mb = 1024

# [persistence]
# 是否启用 WAL（写入路径更可靠，但会增加写放大与延迟）。
enable_wal = true
# 是否启用周期性快照（降低恢复时间；会带来周期性 I/O）。
enable_snapshot = true
# 快照间隔（秒）。例如 3600 = 1 小时。
snapshot_interval_seconds = 3600
# WAL 刷盘间隔（毫秒）。更小更安全但更慢；更大吞吐更好但崩溃丢失窗口更大。
wal_sync_interval_ms = 100
# 单个 WAL 文件最大大小（MB）。超过后会滚动新文件（具体策略依赖实现）。
max_wal_file_size_mb = 100

# [logging]
# 日志级别：DEBUG / INFO / WARN / ERROR
# - 线上/压测建议 INFO 或 WARN，避免 DEBUG 造成 I/O 噪声影响性能。
# - Debug 构建下：若未显式传 `--log-level`，程序可能默认提升为 DEBUG 以便排障。
# - 若要做性能对比/压测：建议使用 Release 构建并固定 `log_level=INFO`（或命令行 `--log-level INFO`）。
log_level = INFO
# 日志文件路径模板。
# - 当前为固定文件名：程序会写入该文件，并由内部 rotating 机制自动滚动（例如 sunkv.log.1）
# - 若为空字符串，可能退回到仅控制台输出（视实现而定）
log_file = ./data/logs/sunkv.log
# 日志文件策略：fixed / per_run / daily
# - fixed：固定文件名（如 sunkv.log），由 rotating 自动滚动
# - per_run：每次启动生成独立文件（如 sunkv_YYYYMMDD_HHMMSS.log），文件内仍可滚动
# - daily：按日期归档（如 sunkv_YYYYMMDD.log），文件内仍可滚动
log_strategy = fixed
# 是否开启控制台日志（当前版本可能尚未完全接入；以实现为准）。
enable_console_log = true
# 是否定期打印运行统计（QPS/延迟等，视实现内容）。
enable_periodic_stats_log = false
# 定期统计日志间隔（秒）。启用 enable_periodic_stats_log 后生效。
stats_log_interval_seconds = 30

# [ttl]
# TTL 清理线程扫描间隔（秒）。过小会增加后台开销，过大可能导致过期键滞留更久。
ttl_cleanup_interval_seconds = 5
# 允许设置的最大 TTL（秒）。2592000 = 30 天。
max_ttl_seconds = 2592000

# [performance]
# TCP keepalive 时间（秒）。用于检测死连接（具体行为受系统 keepalive 参数影响）。
tcp_keepalive_seconds = 300
# TCP 发送缓冲建议大小（字节）。是否真正生效取决于 setsockopt 实现。
tcp_send_buffer_size = 65536
# TCP 接收缓冲建议大小（字节）。是否真正生效取决于 setsockopt 实现。
tcp_recv_buffer_size = 65536

